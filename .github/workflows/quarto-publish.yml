name: Quarto Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          libcurl4-openssl-dev \
          libssl-dev \
          libxml2-dev \
          libc6-dev \
          build-essential \
          libpng-dev \
          libgdal-dev \
          gdal-bin \
          libproj-dev \
          libgeos-dev \
          libudunits2-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libtiff-dev \
          libjpeg-dev \
          libharfbuzz-dev \
          libfribidi-dev \
          libglpk-dev \
          libsqlite3-dev \
          libmagick++-dev

      - name: Install R dependencies
        run: |
          lib <- Sys.getenv("R_LIBS_USER")
          cat("Resetting R_LIBS_USER:", lib, "\n")
          if (dir.exists(lib)) {
            unlink(list.files(lib, all.files = TRUE, full.names = TRUE, no.. = TRUE), recursive = TRUE, force = TRUE)
          }
          dir.create(lib, recursive = TRUE, showWarnings = FALSE)
          .libPaths(c(lib, .libPaths()))
          install.packages("renv", repos = "https://cloud.r-project.org", lib = lib)
          options(Ncpus = 2)
          Sys.setenv(RENV_CONFIG_CACHE_ENABLED = "FALSE")
          cat("Restoring packages from lockfile into R_LIBS_USER\n")
          renv::restore(confirm = FALSE, library = lib, rebuild = c("xfun", "knitr", "rmarkdown"))
          cat("Installing Quarto-critical packages directly into R_LIBS_USER\n")
          install.packages(c("xfun", "knitr", "rmarkdown"), repos = "https://cloud.r-project.org", lib = lib)
        shell: Rscript {0}

      - name: Verify Quarto R packages
        run: |
          library(knitr)
          library(rmarkdown)
          library(xfun)
          cat("knitr:", as.character(packageVersion("knitr")), "\n")
          cat("rmarkdown:", as.character(packageVersion("rmarkdown")), "\n")
          cat("xfun:", as.character(packageVersion("xfun")), "\n")
        shell: Rscript {0}

      - name: Show R library paths
        run: Rscript -e '.libPaths()'

      - name: Render Quarto Project
        run: quarto render

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
